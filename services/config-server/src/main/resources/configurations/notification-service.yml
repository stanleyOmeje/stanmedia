spring:
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: orderGroup, paymentGroup, notificationGroup
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: '*'
        spring.json.type.mapping: orderConfirmation:com.stan.notification.kafka.order.OrderConfirmation,paymentConfirmation:com.stan.notification.kafka.payment.PaymentConfirmation
  data:
    mongodb:
      username: stan
      password: stan
      host: localhost
      database: customer
      authentication-database: admin
      port: 27017

  mail:
    host: localhost
    username: stan
    password: stan
    port: 1025
    properties:
      mail:
        smtp:
          trust: '*'
        auth: true
        starttls:
          enabled: true
        connectiontimeout: 5000
        timeout: 3000
        writetimeout: 5000
server:
  port: 8094
